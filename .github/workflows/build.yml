name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run shared module checks
        run: ./gradlew :shared:check --no-daemon

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: ${{ github.ref == 'refs/heads/main' && 90 || 7 }}

  build-desktop:
    name: Build Desktop (${{ matrix.os-label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os-label: Linux
            installer-glob: desktopApp/build/compose/binaries/main/deb/*.deb
            artifact-name: desktop-linux-deb
          - os: macos-latest
            os-label: macOS
            installer-glob: desktopApp/build/compose/binaries/main/dmg/*.dmg
            artifact-name: desktop-macos-dmg
          - os: windows-latest
            os-label: Windows
            installer-glob: desktopApp/build/compose/binaries/main/msi/*.msi
            artifact-name: desktop-windows-msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Package Desktop distributable
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon

      - name: Upload Desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.installer-glob }}
          retention-days: ${{ github.ref == 'refs/heads/main' && 90 || 7 }}
